<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Recorder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface-2: #1f1f1f;
      --border: #2a2a2a;
      --text: #e2e2e2;
      --text-muted: #888;
      --blue: #3b82f6;
      --blue-hover: #2563eb;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* --- Form card --- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.grow { flex: 1; }

    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="url"],
    input[type="number"] {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      height: 38px;
      padding: 0 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus {
      border-color: var(--blue);
    }

    input::placeholder {
      color: #555;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      height: 38px;
      padding: 0 18px;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--blue-hover);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.25);
    }

    .btn-download {
      background: rgba(34, 197, 94, 0.12);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .btn-download:hover:not(:disabled) {
      background: rgba(34, 197, 94, 0.22);
    }

    .btn-delete {
      background: transparent;
      color: #555;
      border: 1px solid #333;
    }

    .btn-delete:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.12);
      color: var(--red);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .btn-logs {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-logs:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.09);
      color: var(--text);
    }

    .form-error {
      margin-top: 12px;
      font-size: 13px;
      color: var(--red);
    }

    /* --- Recordings list --- */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .refresh-indicator {
      font-size: 11px;
      color: #444;
    }

    .recordings-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Wrapper handles border, border-radius, and the colored left stripe */
    .recording-wrapper {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .recording-wrapper.status-starting { border-left: 3px solid #555; }
    .recording-wrapper.status-recording { border-left: 3px solid var(--blue); }
    .recording-wrapper.status-stopping  { border-left: 3px solid var(--amber); }
    .recording-wrapper.status-completed { border-left: 3px solid var(--green); }
    .recording-wrapper.status-failed    { border-left: 3px solid var(--red); }

    .recording-item {
      background: var(--surface);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .recording-info {
      flex: 1;
      min-width: 0;
    }

    .recording-url {
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .recording-meta {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .badge-starting {
      background: rgba(128, 128, 128, 0.15);
      color: #888;
    }
    .badge-starting .badge-dot {
      background: #666;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .badge-recording {
      background: rgba(59, 130, 246, 0.15);
      color: var(--blue);
    }
    .badge-recording .badge-dot {
      background: var(--blue);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .badge-stopping {
      background: rgba(245, 158, 11, 0.15);
      color: var(--amber);
    }
    .badge-stopping .badge-dot { background: var(--amber); }

    .badge-completed {
      background: rgba(34, 197, 94, 0.12);
      color: var(--green);
    }
    .badge-completed .badge-dot { background: var(--green); }

    .badge-failed {
      background: rgba(239, 68, 68, 0.12);
      color: var(--red);
    }
    .badge-failed .badge-dot { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .recording-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* --- Log panel --- */
    .log-panel {
      border-top: 1px solid var(--border);
      background: #0a0a0a;
    }

    .log-output {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      line-height: 1.7;
      color: #999;
      padding: 12px 16px;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line.highlight {
      color: var(--green);
      font-weight: 600;
    }

    .log-empty {
      color: #444;
      font-style: italic;
    }

    /* --- Empty state --- */
    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-state p:first-child {
      font-size: 28px;
      margin-bottom: 8px;
    }

    @media (max-width: 560px) {
      .form-row { flex-direction: column; }
      .recording-item { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="dot"></div>
    <h1>Web Recorder</h1>
  </header>

  <div class="container">
    <div class="card">
      <h2>Nuova Registrazione</h2>
      <form @submit.prevent="startRecording" autocomplete="off">
        <div class="form-row">
          <div class="field grow">
            <label>URL</label>
            <input v-model="newUrl" type="url" placeholder="https://example.com" required>
          </div>
          <div class="field" style="width:130px">
            <label>Durata (opzionale)</label>
            <input v-model="newDuration" type="text" placeholder="es. 60">
          </div>
          <button type="submit" class="btn-primary" :disabled="submitting">
            {{ submitting ? 'Avvio\u2026' : 'Avvia registrazione' }}
          </button>
        </div>
        <div v-if="formError" class="form-error">{{ formError }}</div>
      </form>
    </div>

    <div class="section-header">
      <h2>Registrazioni</h2>
      <span class="refresh-indicator">aggiornamento automatico attivo</span>
    </div>

    <div class="recordings-list">
      <div v-if="recordings.length === 0" class="empty-state">
        <p>&#9654;</p>
        <p>Nessuna registrazione. Avviarne una sopra.</p>
      </div>

      <div
        v-for="r in recordings"
        :key="r.id"
        class="recording-wrapper"
        :class="`status-${effectiveStatus(r)}`"
      >
        <div class="recording-item">
          <div class="recording-info">
            <div class="recording-url" :title="r.url">{{ r.url }}</div>
            <div class="recording-meta">
              <span>Avviata {{ fmt(r.startedAt) }}</span>
              <span>{{ timeInfoFor(r) }}</span>
              <span v-if="r.duration">Limite: {{ r.duration }}s</span>
            </div>
          </div>
          <span class="badge" :class="`badge-${effectiveStatus(r)}`">
            <span class="badge-dot"></span>{{ badgeLabel(r) }}
          </span>
          <div class="recording-actions">
            <button
              v-if="r.status === 'recording'"
              class="btn-danger"
              :disabled="stoppingIds.has(r.id)"
              @click="stopRecording(r.id)"
            >Ferma</button>
            <button
              v-if="r.downloadable"
              class="btn-download"
              @click="downloadRecording(r.id)"
            >Scarica</button>
            <button
              v-if="r.status === 'completed' || r.status === 'failed'"
              class="btn-delete"
              :disabled="deletingIds.has(r.id)"
              @click="deleteRecording(r.id)"
            >Elimina</button>
            <button class="btn-logs" @click="toggleLogs(r.id)">
              Log {{ expandedLogs.has(r.id) ? '\u25b2' : '\u25bc' }}
            </button>
          </div>
        </div>
        <div v-show="expandedLogs.has(r.id)" class="log-panel">
          <div class="log-output" :ref="el => setLogOutputRef(r.id, el)">
            <div v-if="getJobLogs(r.id).length === 0" class="log-empty">Nessun output ancora\u2026</div>
            <div
              v-for="(line, idx) in getJobLogs(r.id)"
              :key="idx"
              class="log-line"
              :class="{ highlight: line.includes('Starting FFmpeg') }"
            >{{ line }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp, ref, reactive, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const recordings = ref([]);
    const newUrl = ref('');
    const newDuration = ref('');
    const submitting = ref(false);
    const formError = ref('');

    // Vue 3 tracks reactive Map/Set mutations (add, delete, get, has)
    const expandedLogs = reactive(new Set());
    const jobLogs = reactive(new Map());
    const stoppingIds = reactive(new Set());
    const deletingIds = reactive(new Set());

    // Non-reactive: SSE connections and DOM element refs
    const eventSources = new Map();
    const logOutputRefs = new Map();

    // ── Helpers ───────────────────────────────────────────────────────────

    function fmt(iso) {
      if (!iso) return '\u2014';
      return new Date(iso).toLocaleString(undefined, {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
      });
    }

    function elapsed(start, end) {
      const ms = new Date(end || Date.now()) - new Date(start);
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      if (h > 0) return `${h}h ${m % 60}m ${s % 60}s`;
      if (m > 0) return `${m}m ${s % 60}s`;
      return `${s}s`;
    }

    function effectiveStatus(r) {
      return r.status === 'recording' && !r.ffmpegStartedAt ? 'starting' : r.status;
    }

    function badgeLabel(r) {
      const s = effectiveStatus(r);
      if (s === 'starting') return 'Avvio';
      if (s === 'stopping') return 'Arresto';
      if (s === 'recording') return 'Registrazione';
      if (s === 'completed') return 'Completata';
      if (s === 'failed') return 'Errore';
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function timeInfoFor(r) {
      if (r.status === 'recording') {
        return r.ffmpegStartedAt
          ? `${elapsed(r.ffmpegStartedAt)} registrazione`
          : 'Preparazione ambiente\u2026';
      }
      if (r.status === 'stopping') {
        return r.ffmpegStartedAt
          ? `${elapsed(r.ffmpegStartedAt)} \u00b7 Finalizzazione\u2026`
          : 'Finalizzazione\u2026';
      }
      if (r.completedAt) {
        const from = r.ffmpegStartedAt || r.startedAt;
        return `${elapsed(from, r.completedAt)} registrata`;
      }
      return `${elapsed(r.startedAt)} trascorsi`;
    }

    function getJobLogs(id) {
      return jobLogs.get(id) || [];
    }

    // ── Log panel ─────────────────────────────────────────────────────────

    function setLogOutputRef(id, el) {
      if (el) logOutputRefs.set(id, el);
      else logOutputRefs.delete(id);
    }

    async function toggleLogs(id) {
      if (expandedLogs.has(id)) {
        expandedLogs.delete(id);
      } else {
        expandedLogs.add(id);
        connectLogs(id);
        await nextTick();
        const el = logOutputRefs.get(id);
        if (el) el.scrollTop = el.scrollHeight;
      }
    }

    function connectLogs(jobId) {
      if (eventSources.has(jobId)) return;

      const es = new EventSource(`/api/recordings/${jobId}/logs`);
      eventSources.set(jobId, es);

      es.onmessage = async (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }

        if (msg.type === 'log') {
          if (!jobLogs.has(jobId)) jobLogs.set(jobId, []);

          // Check scroll position before Vue updates the DOM
          const el = logOutputRefs.get(jobId);
          const atBottom = !el || (el.scrollHeight - el.scrollTop <= el.clientHeight + 20);

          jobLogs.get(jobId).push(msg.line);

          if (atBottom && expandedLogs.has(jobId)) {
            await nextTick();
            const scrollEl = logOutputRefs.get(jobId);
            if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
          }
        } else if (msg.type === 'ffmpegStarted') {
          const rec = recordings.value.find(r => r.id === jobId);
          if (rec && !rec.ffmpegStartedAt) {
            rec.ffmpegStartedAt = msg.timestamp;
          }
        } else if (msg.type === 'done') {
          es.close();
          eventSources.delete(jobId);
          await fetchRecordings();
        }
      };

      es.onerror = () => {
        es.close();
        eventSources.delete(jobId);
      };
    }

    // ── API calls ─────────────────────────────────────────────────────────

    async function fetchRecordings() {
      try {
        const r = await fetch('/api/recordings');
        recordings.value = await r.json();
      } catch {
        // silently ignore — will retry on next poll
      }
    }

    async function startRecording() {
      formError.value = '';
      const url = newUrl.value.trim();
      const duration = newDuration.value.trim();
      if (!url) { formError.value = 'URL obbligatorio.'; return; }

      submitting.value = true;
      try {
        const body = { url };
        if (duration) body.duration = duration;

        const r = await fetch('/api/recordings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await r.json();
        if (!r.ok) { formError.value = data.error || 'Avvio registrazione non riuscito.'; return; }

        newUrl.value = '';
        newDuration.value = '';
        await fetchRecordings();
      } catch {
        formError.value = 'Errore di rete. Il server è in esecuzione?';
      } finally {
        submitting.value = false;
      }
    }

    async function stopRecording(id) {
      stoppingIds.add(id);
      try {
        const r = await fetch(`/api/recordings/${id}`, { method: 'DELETE' });
        if (!r.ok) {
          const { error } = await r.json();
          alert(error);
        }
        await fetchRecordings();
      } finally {
        stoppingIds.delete(id);
      }
    }

    function downloadRecording(id) {
      window.location.href = `/api/recordings/${id}/download`;
    }

    async function deleteRecording(id) {
      if (!confirm('Eliminare questa registrazione? Il file verrà rimosso definitivamente.')) return;
      deletingIds.add(id);
      try {
        const r = await fetch(`/api/recordings/${id}`, { method: 'DELETE' });
        if (!r.ok) {
          const { error } = await r.json();
          alert(error);
          return;
        }
        await fetchRecordings();
      } catch {
        alert('Errore di rete.');
      } finally {
        deletingIds.delete(id);
      }
    }

    // ── Polling ───────────────────────────────────────────────────────────

    onMounted(() => {
      fetchRecordings();
      setInterval(fetchRecordings, 2000);
    });

    return {
      recordings, newUrl, newDuration, submitting, formError,
      expandedLogs, jobLogs, stoppingIds, deletingIds,
      setLogOutputRef,
      fmt, effectiveStatus, badgeLabel, timeInfoFor, getJobLogs,
      toggleLogs,
      startRecording, stopRecording, downloadRecording, deleteRecording,
    };
  }
}).mount('#app');
</script>
</body>
</html>
